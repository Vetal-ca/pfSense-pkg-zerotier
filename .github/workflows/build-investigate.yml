name: Build investigate

on:
  push: # Any branch
  workflow_dispatch:
#    branches:
#      - master
#  pull_request:
#    branches:
#      - master

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build ZeroTier package for pfSense
#    env:
#      MYTOKEN : ${{ secrets.MYTOKEN }}
#      MYTOKEN2: "value2"
    steps:
    - uses: actions/checkout@v4
    - name: Do the build
      id: create_release
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        prepare: |
          source ~/.profile
          pkg install -y git gmake tree

        run: |
          
          # pwd 
          #  /home/runner/work/pfSense-pkg-zerotier/pfSense-pkg-zerotier
          git clone https://github.com/pfsense/FreeBSD-ports.git
          echo 'ALLOW_UNSUPPORTED_SYSTEM=YES' | sudo tee -a /etc/make.conf
          # Avoid copy of FreeBSD-ports into itself
          rsync -av --exclude='FreeBSD-ports' . FreeBSD-ports/net/pfSense-pkg-zerotier
          cd FreeBSD-ports/net/pfSense-pkg-zerotier
          echo "VitaliL make clean"
          find . -name info.xml
          make clean
          echo "Vitali: make package"
          find . -name info.xml
          make package
          echo "Vitali: Done"
          find . -name info.xml
          ls -la
          echo "Vitali: tree"
          tree .