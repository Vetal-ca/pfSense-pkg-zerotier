name: Build FreeBSD Package

on:
  push: # Any branch
  workflow_dispatch:
#    branches:
#      - master
#  pull_request:
#    branches:
#      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up FreeBSD VM
      uses: vmactions/freebsd-vm@v0.1.0
      with:
        freebsd-version: '14.0'
        memory: '2048'
        disk-size: '20G'

    - name: Install dependencies
      run: |
        sudo pkg install -y git gmake

    - name: Build package
      run: |
        git clone https://github.com/pfsense/FreeBSD-ports.git
        echo 'ALLOW_UNSUPPORTED_SYSTEM=YES' | sudo tee -a /etc/make.conf
        cp -r . FreeBSD-ports/net/pfSense-pkg-zerotier
        cd FreeBSD-ports/net/pfSense-pkg-zerotier
        make clean
        make package
        cp work/pkg/pfSense-pkg-zerotier-0.00.1.txz .

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v0.00.1
        release_name: Release v0.00.1
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./pfSense-pkg-zerotier-0.00.1.txz
        asset_name: pfSense-pkg-zerotier-0.00.1.txz
        asset_content_type: application/octet-stream