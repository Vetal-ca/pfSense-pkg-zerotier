name: Build

on:
  push: # Any branch
  workflow_dispatch:
#    branches:
#      - master
#  pull_request:
#    branches:
#      - master

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build ZeroTier package for pfSense
#    env:
#      MYTOKEN : ${{ secrets.MYTOKEN }}
#      MYTOKEN2: "value2"
    steps:
    - uses: actions/checkout@v4
    - name: Do the build
      id: build_package
      uses: vmactions/freebsd-vm@v1
      with:
#        envs: 'MYTOKEN MYTOKEN2'
        usesh: true
        prepare: |
          source ~/.profile
          pkg install -y git gmake

        run: |
          git clone https://github.com/pfsense/FreeBSD-ports.git
          echo 'ALLOW_UNSUPPORTED_SYSTEM=YES' | sudo tee -a /etc/make.conf
          cp -r . FreeBSD-ports/net/pfSense-pkg-zerotier
          cur_dir="$(pwd)"
          ztdir="${cur_dir}/FreeBSD-ports/net/pfSense-pkg-zerotier"
          cd "${ztdir}"

          make clean && make package
#          make clean > make_clean.log 2>&1
#          make package > make_package.log 2>&1
          cd -
#          cp "${ztdir}/work/pkg/pfSense-pkg-zerotier-0.00.1.txz" .
#          echo "Cleanup ports"
#          rm -rf FreeBSD-ports

#    - name: Upload make clean log
#      uses: actions/upload-artifact@v3
#      with:
#        name: make-clean-log
#        path: FreeBSD-ports/net/pfSense-pkg-zerotier/make_clean.log
#
#    - name: Upload make package log
#      uses: actions/upload-artifact@v3
#      with:
#        name: make-package-log
#        path: FreeBSD-ports/net/pfSense-pkg-zerotier/make_package.log

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./FreeBSD-ports/net/pfSense-pkg-zerotier/work/pkg/pfSense-pkg-zerotier-0.00.1.txz
        asset_name: pfSense-pkg-zerotier-0.00.1.txz
        asset_content_type: application/octet-stream