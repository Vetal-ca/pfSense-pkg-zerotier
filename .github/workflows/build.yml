name: Build

on:
 # push: # Any branch
#  workflow_dispatch:
#    branches:
#      - master
#  pull_request:
#    branches:
#      - master

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build ZeroTier package for pfSense
#    env:
#      MYTOKEN : ${{ secrets.MYTOKEN }}
#      MYTOKEN2: "value2"
    steps:
    - uses: actions/checkout@v4
    - name: Do the build
      id: create_release
      uses: vmactions/freebsd-vm@v1
      with:
#        envs: 'MYTOKEN MYTOKEN2'
        usesh: true
        prepare: |
          source ~/.profile
          pkg install -y git gmake

        run: |
          git clone https://github.com/pfsense/FreeBSD-ports.git
          echo 'ALLOW_UNSUPPORTED_SYSTEM=YES' | sudo tee -a /etc/make.conf
          cp -r . FreeBSD-ports/net/pfSense-pkg-zerotier
          ztdir="$(pwd)/FreeBSD-ports/net/pfSense-pkg-zerotier"
          pushd .
          cd "${ztdir}"
          echo "Current directory: $(pwd)"

          make clean
          make package
          popd
          
          # Can be removed
          echo "List files"
          ls -la "${ztdir}"
          ls -la "${ztdir}/work/pkg/"
          cp "${ztdir}/work/pkg/pfSense-pkg-zerotier-0.00.1.txz" .
          echo "Cleanup ports"
          rm -rf FreeBSD-ports

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
#        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./pfSense-pkg-zerotier-0.00.1.txz
        asset_name: pfSense-pkg-zerotier-0.00.1.txz
        asset_content_type: application/octet-stream